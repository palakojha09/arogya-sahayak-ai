name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov

      - name: Lint
        run: ruff check .

      - name: Format Check
        run: ruff format --check .

      - name: Type Check
        run: mypy backend

      - name: Run Tests
        run: pytest

      - name: Coverage
        run: pytest --cov=backend