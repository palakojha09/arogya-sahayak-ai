stages:
  - quality
  - security

quality-checks:
  stage: quality
  image: python:3.11

  before_script:
    - pip install ruff mypy pip-audit

  script:
    - ruff check .
    - mypy backend
    - pip-audit

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]

  script:
    - gitleaks detect --source . --verbose