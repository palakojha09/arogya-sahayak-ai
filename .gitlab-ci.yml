stages:
  - quality
  - security

quality-checks:
  stage: quality
  image: python:3.11

  before_script:
    - pip install ruff mypy pip-audit pytest pytest-cov

  script:
    - ruff check .
    - ruff format --check .
    - mypy backend
    - pip-audit
    - pytest --cov=backend --cov-report=term

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]

  script:
    - gitleaks detect --source . --verbose