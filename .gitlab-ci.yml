stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

default:
  image: python:3.11

before_script:
  - python3 -m venv .venv
  - source .venv/bin/activate
  - python -m pip install --upgrade pip
  - python -m pip install -r backend/requirements.txt
  - python -m pip install ruff mypy pytest pytest-cov pip-audit

lint:
  stage: lint
  script:
    - source .venv/bin/activate
    - ruff check .

format:
  stage: format
  script:
    - source .venv/bin/activate
    - ruff format --check .

type_check:
  stage: type_check
  script:
    - source .venv/bin/activate
    - mypy backend

test:
  stage: test
  script:
    - source .venv/bin/activate
    - PYTHONPATH=backend pytest

coverage:
  stage: coverage
  script:
    - source .venv/bin/activate
    - PYTHONPATH=backend pytest --cov=backend --cov-report=term

dependency_audit:
  stage: security
  script:
    - source .venv/bin/activate
    - pip-audit || true

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --verbose || true